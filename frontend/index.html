<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Name (2016) Canonical QA Chatbot</title>
  <style>
    :root{
      --card-bg: rgba(20, 22, 28, 0.45);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --shadow: 0 10px 35px rgba(0,0,0,0.45);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background: #0b0d12;
      overflow-x: hidden;
    }

    /* Background poster + blur overlay */
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background-image: url("/static/bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.05);
      filter: saturate(1.05) brightness(0.85);
      z-index: -2;
    }
    body::after{
      content:"";
      position: fixed;
      inset: 0;
      background: radial-gradient(1200px 800px at 20% 10%, rgba(120,170,255,0.20), transparent 55%),
                  radial-gradient(1000px 700px at 80% 20%, rgba(255,120,200,0.16), transparent 60%),
                  linear-gradient(to bottom, rgba(5,6,10,0.55), rgba(5,6,10,0.75));
      z-index: -1;
    }

    .wrap{
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }

    .card{
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header{
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .title{
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin: 0;
    }
    .subtitle{
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .chat{
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 420px;

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    #messages{
      height: 52vh;
      min-height: 360px;
      max-height: 62vh;
      overflow-y: auto;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    /* Message rows */
    .row{
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .row.user{
      justify-content: flex-end;
    }

    /* Avatar only on assistant rows */
    .avatar{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .avatar img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bubble{
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .row.user .bubble{
      background: rgba(120,170,255,0.16);
      border: 1px solid rgba(120,170,255,0.22);
    }

    .meta{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    .inputbar{
      display: flex;
      gap: 10px;
      padding: 10px 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    #user-input{
      flex: 1;
      border-radius: 12px;
      padding: 12px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.20);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }
    #user-input::placeholder{
      color: rgba(255,255,255,0.55);
    }
    #send-btn{
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      min-width: 92px;
    }
    #send-btn:disabled{
      opacity: 0.55;
      cursor: not-allowed;
    }

    .footerhint{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      padding: 10px 14px 12px;
    }
    code{
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card header">
      <h1 class="title">Your Name (2016) Canonical QA Chatbot</h1>
    </div>

    <div class="card chat">
      <div id="messages"></div>

      <div class="inputbar">
        <input id="user-input" type="text" placeholder="Ask a question about Your Name (2016) canon..." />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>

      <div class="footerhint">
        Tip: Try <code>Why do Mitsuha and Taki forget each other's names?</code>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    function escapeHtml(text){
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function appendUser(text){
      const row = document.createElement("div");
      row.className = "row user";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHtml(text);

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendAssistant(text, route){
      const row = document.createElement("div");
      row.className = "row assistant";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      const img = document.createElement("img");
      img.src = "/static/mitsuha.jpg";
      img.alt = "Mitsuha";
      avatar.appendChild(img);

      const bubbleWrap = document.createElement("div");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHtml(text);

      bubbleWrap.appendChild(bubble);

      // Optional: show route for debugging (comment out for final)
      // const meta = document.createElement("div");
      // meta.className = "meta";
      // meta.textContent = "route: " + (route || "unknown");
      // bubbleWrap.appendChild(meta);

      row.appendChild(avatar);
      row.appendChild(bubbleWrap);

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(){
      const msg = inputEl.value.trim();
      if(!msg) return;

      appendUser(msg);
      inputEl.value = "";
      inputEl.focus();

      sendBtn.disabled = true;

      try{
        const resp = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({message: msg})
        });

        if(!resp.ok){
          appendAssistant("Error: request failed (" + resp.status + ")", "error");
          return;
        }

        const data = await resp.json();
        appendAssistant(data.answer || "(empty)", data.route);
      } catch(e){
        appendAssistant("Error: " + String(e), "error");
      } finally{
        sendBtn.disabled = false;
      }
    }

    inputEl.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendMessage();
      }
    });
  </script>
</body>
</html>
