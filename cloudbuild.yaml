steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/ieor-4576-agentic/chatbot-repo/your-name-chatbot:$COMMIT_SHA",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/ieor-4576-agentic/chatbot-repo/your-name-chatbot:$COMMIT_SHA",
      ]
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "your-name-chatbot",
        "--image",
        "us-central1-docker.pkg.dev/ieor-4576-agentic/chatbot-repo/your-name-chatbot:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--service-account",
        "chatbot-runner@ieor-4576-agentic.iam.gserviceaccount.com",
        "--set-env-vars",
        "VERTEX_PROJECT=ieor-4576-agentic,VERTEX_LOCATION=us-central1,MODEL=vertex_ai/gemini-2.0-flash-lite",
      ]